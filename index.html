<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kegel Mind & Flow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .bg-mint { background-color: #f0fdf4; }
        .bg-sky { background-color: #f0f9ff; }
        .bg-lavender { background-color: #f5f3ff; }
        .progress-circle { transition: stroke-dashoffset 0.3s ease; }
        .dot-mint { background-color: #4ade80; }
        .dot-sky { background-color: #38bdf8; }
        .dot-lavender { background-color: #a78bfa; }
        .dot-gray { background-color: #cbd5e1; }
    </style>
</head>
<body class="pb-24">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <div id="view-login" class="flex-1 flex flex-col items-center justify-center p-8 text-center space-y-6">
            <div class="w-20 h-20 bg-emerald-100 rounded-3xl flex items-center justify-center shadow-inner">
                <i data-lucide="shield-check" class="w-10 h-10 text-emerald-600"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Kegel Flow</h1>
                <p class="text-slate-400 text-sm">Tu salud vascular en equilibrio</p>
            </div>
            <div class="w-full space-y-3">
                <input type="text" id="user-name" placeholder="Tu nombre" class="w-full p-4 rounded-2xl border border-slate-100 shadow-sm focus:ring-2 focus:ring-emerald-400 outline-none">
                <input type="text" id="user-key" placeholder="Clave Secreta (opcional)" class="w-full p-4 rounded-2xl border border-slate-100 shadow-sm focus:ring-2 focus:ring-emerald-400 outline-none">
                <button onclick="login()" class="w-full bg-emerald-500 text-white p-4 rounded-2xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-600 transition-all">Ingresar</button>
            </div>
        </div>

        <div id="view-main" class="hidden flex-1 p-5 space-y-6">
            <header class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold" id="greeting">¡Hola!</h2>
                    <p class="text-[10px] uppercase tracking-widest font-bold text-slate-400" id="plan-label">PLAN: --</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="showView('view-settings')" class="p-2 bg-white rounded-xl shadow-sm"><i data-lucide="settings" class="w-5 h-5 text-slate-400"></i></button>
                </div>
            </header>

            <div class="space-y-3">
                <h3 class="text-sm font-bold text-slate-500 flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4"></i> SESIONES DE HOY</h3>
                <div id="daily-blocks" class="grid grid-cols-1 gap-3">
                    </div>
                <button id="btn-extra" onclick="openBlock('Extra')" class="hidden w-full py-3 bg-white border-2 border-dashed border-emerald-100 text-emerald-600 rounded-2xl text-xs font-bold">+ REALIZAR SESIÓN EXTRA</button>
            </div>

            <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="cal-month-name" class="font-bold text-slate-700 capitalize">Mes Año</h3>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-1 hover:bg-slate-100 rounded-lg"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <button onclick="changeMonth(1)" class="p-1 hover:bg-slate-100 rounded-lg"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-2 mb-2">
                    <div class="text-[10px] text-center font-bold text-slate-300">DOM</div>
                    <div class="text-[10px] text-center font-bold text-slate-300">LUN</div>
                    <div class="text-[10px] text-center font-bold text-slate-300">MAR</div>
                    <div class="text-[10px] text-center font-bold text-slate-300">MIE</div>
                    <div class="text-[10px] text-center font-bold text-slate-300">JUE</div>
                    <div class="text-[10px] text-center font-bold text-slate-300">VIE</div>
                    <div class="text-[10px] text-center font-bold text-slate-300">SAB</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2">
                    </div>
                <div class="mt-4 pt-4 border-t border-slate-50 flex flex-wrap gap-3 justify-center">
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full dot-mint"></span> <span class="text-[9px] font-bold text-slate-400">COMPLETO</span></div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full dot-sky"></span> <span class="text-[9px] font-bold text-slate-400">EN CURSO</span></div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full dot-lavender"></span> <span class="text-[9px] font-bold text-slate-400">DESCANSO</span></div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full dot-gray"></span> <span class="text-[9px] font-bold text-slate-400">PENDIENTE</span></div>
                </div>
            </div>
        </div>

        <div id="view-exercise" class="hidden flex-1 flex flex-col bg-white p-6">
            <button onclick="confirmExit()" class="self-start text-slate-400 flex items-center gap-1 mb-10">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Salir
            </button>
            <div class="flex-1 flex flex-col items-center justify-center text-center space-y-8">
                <div class="animate-pulse">
                    <h2 id="ex-title" class="text-3xl font-black text-slate-800 tracking-tight">--</h2>
                    <p id="ex-desc" class="text-slate-400 text-sm mt-2">--</p>
                </div>

                <div class="relative flex items-center justify-center">
                    <svg class="w-64 h-64 transform -rotate-90">
                        <circle cx="128" cy="128" r="115" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                        <circle id="ex-progress" cx="128" cy="128" r="115" stroke="url(#gradient)" stroke-width="12" fill="transparent" stroke-dasharray="722" stroke-dashoffset="722" class="progress-circle" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#34d399" />
                                <stop offset="100%" stop-color="#38bdf8" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <span id="ex-timer" class="text-6xl font-black text-slate-700">0</span>
                        <span id="ex-action" class="text-xs font-bold tracking-[0.3em] text-emerald-500 mt-2">LISTO</span>
                    </div>
                </div>

                <div id="ex-steps" class="flex gap-2">
                    <div class="w-2 h-2 rounded-full bg-slate-200" id="dot-0"></div>
                    <div class="w-2 h-2 rounded-full bg-slate-200" id="dot-1"></div>
                    <div class="w-2 h-2 rounded-full bg-slate-200" id="dot-2"></div>
                </div>
                
                <button id="btn-action" onclick="runExerciseCycle()" class="w-full max-w-xs bg-slate-900 text-white p-5 rounded-3xl font-bold shadow-xl shadow-slate-200">EMPEZAR PASO</button>
            </div>
        </div>

        <div id="view-settings" class="hidden flex-1 p-8 bg-white space-y-8">
            <div class="flex items-center gap-4">
                <button onclick="showView('view-main')" class="p-2 bg-slate-50 rounded-xl"><i data-lucide="chevron-left"></i></button>
                <h2 class="text-2xl font-bold">Configuración</h2>
            </div>
            
            <div class="space-y-6">
                <div class="bg-slate-50 p-5 rounded-3xl space-y-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Plan de Entrenamiento</label>
                    <select id="set-plan" onchange="updateSettings()" class="w-full bg-transparent font-bold text-slate-700 outline-none">
                        <option value="1x1">1 Día Ejercicio / 1 Descanso</option>
                        <option value="2x1">2 Días Ejercicio / 1 Descanso</option>
                        <option value="mon-fri">Lunes a Viernes (Finde descanso)</option>
                    </select>
                </div>

                <div class="bg-slate-50 p-5 rounded-3xl space-y-4">
                    <div class="flex justify-between">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Resistencia</label>
                        <span id="res-val" class="font-bold text-emerald-500">10s</span>
                    </div>
                    <input type="range" id="set-res" min="5" max="30" step="1" oninput="updateSettings()" class="w-full accent-emerald-500">
                </div>

                <div class="p-6 bg-lavender rounded-3xl space-y-2">
                    <h4 class="text-xs font-bold text-lavender-700 uppercase">Sincronización en la Nube</h4>
                    <p class="text-[10px] text-lavender-500">Copia esta clave para ver tus datos en otro navegador:</p>
                    <div class="bg-white/50 p-3 rounded-xl font-mono text-center text-sm" id="user-id-display">---</div>
                </div>
                
                <button onclick="resetApp()" class="w-full text-red-400 text-xs font-bold hover:text-red-600">Cerrar Sesión y Borrar Datos</button>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO INICIAL ---
        let state = {
            user: '',
            key: '',
            plan: '1x1',
            resTime: 10,
            startDay: new Date().toISOString().split('T')[0],
            logs: {} // Formato: 'YYYY-MM-DD': { 'Mañana': {f:false, r:false, v:false}, ... }
        };

        let currentViewMonth = new Date().getMonth();
        let currentViewYear = new Date().getFullYear();
        let activeExercise = null; // Controla si hay un ejercicio en marcha

        const AUDIO = new (window.AudioContext || window.webkitAudioContext)();

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            const saved = localStorage.getItem('kegel_pro_data');
            if (saved) {
                state = JSON.parse(saved);
                loadApp();
                showView('view-main');
            }
            lucide.createIcons();
        };

        function loadApp() {
            document.getElementById('greeting').innerText = `Hola, ${state.user}`;
            document.getElementById('plan-label').innerText = `PLAN: ${state.plan}`;
            document.getElementById('set-plan').value = state.plan;
            document.getElementById('set-res').value = state.resTime;
            document.getElementById('res-val').innerText = state.resTime + 's';
            document.getElementById('user-id-display').innerText = state.key;
            renderBlocks();
            renderCalendar();
        }

        function login() {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("Ingresa tu nombre");
            state.user = name;
            state.key = document.getElementById('user-key').value || 'KG-' + Math.random().toString(36).substr(2,6).toUpperCase();
            save();
            loadApp();
            showView('view-main');
        }

        function save() {
            localStorage.setItem('kegel_pro_data', JSON.stringify(state));
        }

        function updateSettings() {
            state.plan = document.getElementById('set-plan').value;
            state.resTime = parseInt(document.getElementById('set-res').value);
            document.getElementById('res-val').innerText = state.resTime + 's';
            save();
            loadApp();
        }

        // --- LÓGICA DE CALENDARIO Y PLANES ---

        function isRestDay(date) {
            const d = new Date(date);
            d.setHours(0,0,0,0);
            const start = new Date(state.startDay);
            start.setHours(0,0,0,0);
            const diff = Math.floor((d - start) / (1000*60*60*24));

            if (state.plan === '1x1') return diff % 2 !== 0;
            if (state.plan === '2x1') return (diff + 1) % 3 === 0;
            if (state.plan === 'mon-fri') {
                const day = d.getDay();
                return day === 0 || day === 6;
            }
            return false;
        }

        function getDayStatus(dateStr) {
            const log = state.logs[dateStr];
            if (!log) return isRestDay(dateStr) ? 'rest' : 'pending';
            
            const blocks = ['Mañana', 'Tarde', 'Noche'];
            let completedBlocks = 0;
            blocks.forEach(b => {
                if (log[b] && log[b].f && log[b].r && log[b].v) completedBlocks++;
            });

            if (completedBlocks >= 3) return 'done';
            if (completedBlocks > 0 || Object.keys(log).length > 0) return 'progress';
            return isRestDay(dateStr) ? 'rest' : 'pending';
        }

        function renderBlocks() {
            const container = document.getElementById('daily-blocks');
            container.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            const log = state.logs[today] || {};
            const blocks = ['Mañana', 'Tarde', 'Noche'];
            const rest = isRestDay(today);

            blocks.forEach(b => {
                const isDone = log[b] && log[b].f && log[b].r && log[b].v;
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl flex justify-between items-center transition-all ${isDone ? 'bg-emerald-50 opacity-60' : 'bg-white shadow-sm border border-slate-100'}`;
                card.onclick = () => openBlock(b);
                
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${isDone ? 'bg-emerald-200 text-emerald-700' : 'bg-slate-50 text-slate-400'}">
                            <i data-lucide="${b==='Mañana'?'sun':b==='Tarde'?'cloud-sun':'moon'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm">${b}</p>
                            <p class="text-[10px] text-slate-400">${isDone ? 'SESIÓN COMPLETADA' : (rest ? 'OPCIONAL (DESCANSO)' : 'PENDIENTE')}</p>
                        </div>
                    </div>
                    ${isDone ? '<i data-lucide="check-circle-2" class="text-emerald-500 w-5 h-5"></i>' : '<i data-lucide="chevron-right" class="text-slate-200 w-5 h-5"></i>'}
                `;
                container.appendChild(card);
            });
            document.getElementById('btn-extra').classList.toggle('hidden', !rest);
            lucide.createIcons();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const firstDay = new Date(currentViewYear, currentViewMonth, 1).getDay();
            const daysInMonth = new Date(currentViewYear, currentViewMonth + 1, 0).getDate();
            
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('cal-month-name').innerText = `${monthNames[currentViewMonth]} ${currentViewYear}`;

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentViewYear}-${String(currentViewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const status = getDayStatus(dateStr);
                
                const dayEl = document.createElement('div');
                dayEl.className = `aspect-square rounded-xl flex items-center justify-center text-[10px] font-bold shadow-sm transition-transform active:scale-95`;
                
                if (status === 'done') dayEl.className += " bg-emerald-400 text-white shadow-emerald-100";
                else if (status === 'progress') dayEl.className += " bg-sky-400 text-white shadow-sky-100";
                else if (status === 'rest') dayEl.className += " bg-purple-100 text-purple-400";
                else dayEl.className += " bg-slate-100 text-slate-400";

                dayEl.innerText = day;
                grid.appendChild(dayEl);
            }
        }

        function changeMonth(step) {
            currentViewMonth += step;
            if (currentViewMonth > 11) { currentViewMonth = 0; currentViewYear++; }
            if (currentViewMonth < 0) { currentViewMonth = 11; currentViewYear--; }
            renderCalendar();
        }

        // --- LÓGICA DE EJERCICIOS ---

        let currentBlockName = '';
        let stepIndex = 0; // 0: Firmeza, 1: Resistencia, 2: Vascular

        function openBlock(name) {
            currentBlockName = name;
            stepIndex = 0;
            setupStep();
            showView('view-exercise');
        }

        function setupStep() {
            const steps = [
                { t: "Firmeza", d: "15 contracciones rápidas con relajación total", goal: 15 },
                { t: "Resistencia", d: `10 repeticiones de ${state.resTime}s`, goal: 10 },
                { t: "Salud Vascular", d: "2 minutos de respiración profunda", goal: 120 }
            ];
            const s = steps[stepIndex];
            document.getElementById('ex-title').innerText = s.t;
            document.getElementById('ex-desc').innerText = s.d;
            document.getElementById('ex-timer').innerText = (stepIndex === 0) ? s.goal : (stepIndex === 1 ? state.resTime : "2:00");
            document.getElementById('ex-action').innerText = "PREPARADO";
            document.getElementById('ex-progress').style.strokeDashoffset = 722;
            document.getElementById('btn-action').classList.remove('hidden');
            
            for(let i=0; i<3; i++) {
                document.getElementById(`dot-${i}`).className = `w-2 h-2 rounded-full ${i <= stepIndex ? 'bg-emerald-400' : 'bg-slate-200'}`;
            }
        }

        function playGong() {
            const osc = AUDIO.createOscillator();
            const gain = AUDIO.createGain();
            osc.connect(gain);
            gain.connect(AUDIO.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, AUDIO.currentTime); // Nota C5
            gain.gain.setValueAtTime(0, AUDIO.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, AUDIO.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, AUDIO.currentTime + 2);
            osc.start();
            osc.stop(AUDIO.currentTime + 2);
        }

        async function runExerciseCycle() {
            document.getElementById('btn-action').classList.add('hidden');
            const timerEl = document.getElementById('ex-timer');
            const actionEl = document.getElementById('ex-action');
            const progressEl = document.getElementById('ex-progress');

            if (stepIndex === 0) { // FIRMEZA
                for (let i = 1; i <= 15; i++) {
                    playGong();
                    actionEl.innerText = "¡CONTRAE!";
                    timerEl.innerText = 16 - i;
                    progressEl.style.strokeDashoffset = 722 - (722 * (i/15));
                    await new Promise(r => setTimeout(r, 1000));
                }
            } 
            else if (stepIndex === 1) { // RESISTENCIA
                for (let r = 1; r <= 10; r++) {
                    actionEl.innerText = `REP ${r}/10: CONTRAE`;
                    playGong();
                    for (let s = state.resTime; s >= 0; s--) {
                        timerEl.innerText = s;
                        progressEl.style.strokeDashoffset = 722 - (722 * (s/state.resTime));
                        await new Promise(r => setTimeout(r, 1000));
                    }
                    actionEl.innerText = `REP ${r}/10: RELAJA`;
                    playGong();
                    for (let s = state.resTime; s >= 0; s--) {
                        timerEl.innerText = s;
                        progressEl.style.strokeDashoffset = 722;
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
            } 
            else { // VASCULAR
                playGong();
                actionEl.innerText = "RESPIRA";
                let total = 120;
                for (let s = total; s >= 0; s--) {
                    const m = Math.floor(s/60);
                    const sec = s % 60;
                    timerEl.innerText = `${m}:${sec < 10 ? '0'+sec : sec}`;
                    progressEl.style.strokeDashoffset = 722 - (722 * (s/total));
                    await new Promise(r => setTimeout(r, 1000));
                }
            }

            completeStep();
        }

        function completeStep() {
            playGong();
            const today = new Date().toISOString().split('T')[0];
            if (!state.logs[today]) state.logs[today] = {};
            if (!state.logs[today][currentBlockName]) state.logs[today][currentBlockName] = {f:false, r:false, v:false};
            
            if (stepIndex === 0) state.logs[today][currentBlockName].f = true;
            if (stepIndex === 1) state.logs[today][currentBlockName].r = true;
            if (stepIndex === 2) state.logs[today][currentBlockName].v = true;
            
            save();
            
            if (stepIndex < 2) {
                stepIndex++;
                setTimeout(setupStep, 1000);
            } else {
                alert("¡Sesión de " + currentBlockName + " terminada!");
                loadApp();
                showView('view-main');
            }
        }

        // --- UTILIDADES ---
        function showView(id) {
            ['view-login', 'view-main', 'view-exercise', 'view-settings'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            lucide.createIcons();
        }

        function confirmExit() {
            if (confirm("¿Seguro que quieres salir? Perderás el progreso de esta sesión.")) {
                showView('view-main');
            }
        }

        function resetApp() {
            if(confirm("¿Eliminar todos los datos?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
